on:
  push:
    branches:
      - "*"

name: Docker

permissions:
  contents: read
  packages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true
    
  
jobs:
  docker:
    env:
      IMAGE_NAME: prijindal/godot
    strategy:
      matrix:
        GODOT_VERSION:
          - 4.6.1
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login to docker
        uses: docker/login-action@v4
        with:
          username: prijindal
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download Artifacts
        run: ./download_artifacts.sh

      - name: Extract Artifacts
        run: ./extract_artifacts.sh
        
      - name: Build and push Standard
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: Dockerfile.standard
          sbom: true
          provenance: mode=max
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.GODOT_VERSION }}-standard
          build-args: |
            GODOT_VERSION=${{ matrix.GODOT_VERSION }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Build and push Mono
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: Dockerfile.mono
          sbom: true
          provenance: mode=max
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.GODOT_VERSION }}-mono
          build-args: |
            GODOT_VERSION=${{ matrix.GODOT_VERSION }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
