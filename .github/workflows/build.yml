on:
  push:
    branches:
      - "*"

name: Docker

permissions:
  contents: read
  packages: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true
    
  
jobs:
  docker:
    env:
      IMAGE_NAME: prijindal/godot
    strategy:
      matrix:
        GODOT_VERSION:
          - 4.5.2
          - 4.6.1
          - 4.6.2
        GODOT_FLAVOR:
          - standard
          - mono
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login to docker
        uses: docker/login-action@v4
        with:
          username: prijindal
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download Artifacts
        run: ./download_artifacts_${{ matrix.GODOT_FLAVOR }}.sh
        env:
          GODOT_VERSION: ${{ matrix.GODOT_VERSION }}
        
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: Dockerfile.${{ matrix.GODOT_FLAVOR }}
          sbom: true
          provenance: mode=max
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.GODOT_VERSION }}-${{ matrix.GODOT_FLAVOR }}
          cache-from: type=inline,ref=${{ env.IMAGE_NAME }}:${{ matrix.GODOT_VERSION }}-${{ matrix.GODOT_FLAVOR }}
          cache-to: type=inline
          build-args: |
            GODOT_VERSION=${{ matrix.GODOT_VERSION }}
