when:
  - event: [push, cron, manual]

matrix:
  GODOT_VERSION:
    # - 3.6.2
    # - 4.5.2
    - 4.6.1
  IS_MONO:
    - true
    - false

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: linux/amd64,linux/arm64
      registry: git.prijindal.click
      username: prijindal
      password:
        from_secret: PACKAGE_TOKEN
      tags:
        - ${GODOT_VERSION}-${IS_MONO}
      provenance: mode=max
      build_args:
        GODOT_VERSION: ${GODOT_VERSION}
        IS_MONO: ${IS_MONO}
      repo: git.prijindal.click/${CI_REPO}
      cache-from:
        - type=registry\\,ref=git.prijindal.click/${CI_REPO}:buildcache
      cache-to: type=registry,ref=git.prijindal.click/${CI_REPO}:buildcache,mode=max
