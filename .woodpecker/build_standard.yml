when:
  - event: [push, cron, manual]

matrix:
  GODOT_VERSION:
    # - 3.6.2
    # - 4.5.2
    - 4.6.1

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: linux/arm64
      registry: git.prijindal.click
      username: prijindal
      password:
        from_secret: PACKAGE_TOKEN
      dockerfile: Dockerfile.standard
      tags:
        - ${GODOT_VERSION}-standard
      provenance: mode=max
      build_args:
        GODOT_VERSION: ${GODOT_VERSION}
      repo: git.prijindal.click/${CI_REPO}
      cache-from:
        - type=registry\\,ref=git.prijindal.click/${CI_REPO}:buildcache-standard
      cache-to: type=registry,ref=git.prijindal.click/${CI_REPO}:buildcache-standard,mode=max
